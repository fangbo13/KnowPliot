# V4.1 KB Domain - Port Isolation
# Frontend: 3020, Backend: 8020, DB: 5434, Redis: 6381
# Usage: docker-compose -f docker-compose.v4.kb.yml up -d
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ey_onboarding
      POSTGRES_USER: ey_onboarding
      POSTGRES_PASSWORD: ey_password
    ports:
      - "5434:5432"
    volumes:
      - pgdata_kb:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ey_onboarding"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # V4.2 KB-V4.2-BATCH-007: Redis password matching .env REDIS_URL
    command: redis-server --requirepass sys_redis_pass_2026
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "sys_redis_pass_2026", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
    command: >
      sh -c "python manage.py migrate --no-input &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - media_volume_kb:/app/media
    ports:
      - "8020:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
    command: celery -A config worker --pool=gevent -l info -c 10
    volumes:
      - ./backend:/app
      - media_volume_kb:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # V4.2: SYS domain updated Dockerfile to production build (nginx:alpine)
    # No command override needed — Dockerfile CMD runs nginx on port 80
    ports:
      - "3020:80"
    depends_on:
      - backend

volumes:
  pgdata_kb:
  media_volume_kb:
