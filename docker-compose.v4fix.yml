# V4.0 修复专用 — 使用独立端口避免与其他对话的 Docker 实例冲突
# 与 docker-compose.yml 合并使用：docker compose -f docker-compose.yml -f docker-compose.v4fix.yml -p v4fix up -d

services:
  db:
    ports:
      - "5433:5432"    # 避免 5432 冲突

  redis:
    ports:
      - "6380:6379"    # 避免 6379 冲突

  backend:
    ports:
      - "8001:8000"    # 避免 8000 冲突

  frontend:
    ports:
      - "3004:3000"    # 避免 3003 冲突
