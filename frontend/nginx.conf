# V4.2 SYS-V4.2-011: nginx config for SPA + API proxy
# Serves the Vite production build and proxies API requests to the backend.

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: all non-file routes → index.html (React Router)
    # V4.3 UAT FIX: index.html must NEVER be cached — after rebuilds, the
    # JS bundle filename changes (content hash), and cached index.html still
    # references the old bundle which no longer exists → 404 → blank page.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # V4.3 UAT FIX: Ensure index.html is never cached by browsers.
    # This is critical for SPAs: Vite changes the JS bundle filename on every
    # rebuild (e.g., index-DuVQTAVg.js → index-CU_CWy_K.js). If the browser
    # caches index.html from a prior build, it references a JS file that no
    # longer exists on the server → the entire React app fails to load → blank page.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # API proxy: forward /api/ requests to backend container
    # The VITE_PROXY_TARGET env var in docker-compose determines backend host.
    # nginx resolves "backend" from Docker DNS (same compose network).
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support: disable buffering for streaming endpoints
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health endpoint proxy
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    # Static assets caching (Vite adds content hash to filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression for text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;
}
