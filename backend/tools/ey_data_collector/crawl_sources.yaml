# EY Data Collector — 公开知识源爬取配置
# 目标: 收集 EY 相关公开知识内容，用于新入职培训 AI 知识库

global:
  user_agent: "EY-DataCollector/1.0"
  contact_email: "onboarding.ai@ey.com"
  purpose: "New employee training knowledge content collection"
  max_url_length: 2048
  max_redirects: 3
  max_content_size: 500000
  rate_limit:
    min_delay: 3.0
    max_delay: 7.0
  max_retries: 2
  retry_backoff_base: 60
  timeout:
    connect: 5.0
    read: 30.0
    write: 10.0
  output:
    format: "jsonl"
    dir: "./crawled_knowledge/raw"
  dedup_enabled: true
  logging:
    level: "INFO"
    file: "./crawled_knowledge/crawl.log"

